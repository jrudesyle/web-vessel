<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0D0D">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.png">
  <title>web-vessel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; }
    #container { width: 100%; height: 100%; border: none; }
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      color: #00ff00;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div id="loader">Loading web-vessel...</div>
  <iframe id="container" src="/proxy?url=https://web.telegram.org/k"></iframe>
  
  <script>
    // Hide loader when iframe loads
    document.getElementById('container').addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
    });
    
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
