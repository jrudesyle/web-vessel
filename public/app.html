<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="app-title">web-vessel</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; }
    #container { width: 100%; height: 100%; border: none; }
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      color: #00ff00;
      font-size: 1.5rem;
      text-align: center;
    }
    .loader-spinner {
      border: 3px solid rgba(0, 255, 0, 0.1);
      border-top: 3px solid #00ff00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-spinner"></div>
    <div id="loader-text">Loading...</div>
  </div>
  <iframe id="container"></iframe>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url');
    const theme = params.get('theme') || 'default';
    const appName = params.get('name') || 'App';
    
    document.getElementById('app-title').textContent = appName + ' - web-vessel';
    document.getElementById('loader-text').textContent = `Loading ${appName}...`;
    
    // Load the app via proxy with theme
    const proxyUrl = `/proxy?url=${encodeURIComponent(targetUrl)}&theme=${theme}`;
    const iframe = document.getElementById('container');
    iframe.src = proxyUrl;
    
    // Hide loader when iframe loads
    iframe.addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
    });
    
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
