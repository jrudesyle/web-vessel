<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="app-title">web-vessel</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #0D0D0D; }
    #container { width: 100%; height: 100%; border: none; }
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      color: #00ff00;
      font-size: 1.5rem;
      text-align: center;
    }
    .loader-spinner {
      border: 3px solid rgba(0, 255, 0, 0.1);
      border-top: 3px solid #00ff00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .warning {
      background: rgba(255, 165, 0, 0.1);
      border: 1px solid rgba(255, 165, 0, 0.3);
      color: #ffa500;
      padding: 1rem;
      margin: 1rem;
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-spinner"></div>
    <div id="loader-text">Loading...</div>
    <div class="warning" id="warning" style="display: none;">
      ⚠️ This site may not load due to CORS/iframe restrictions.<br>
      For full functionality, run locally with: <code>npm run dev</code>
    </div>
  </div>
  <iframe id="container"></iframe>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url');
    const theme = params.get('theme') || 'default';
    const appName = params.get('name') || 'App';
    
    // GitHub Pages base path detection
    const basePath = window.location.pathname.includes('/web-vessel') ? '/web-vessel' : '';
    
    document.getElementById('app-title').textContent = appName + ' - web-vessel';
    document.getElementById('loader-text').textContent = `Loading ${appName}...`;
    
    // On GitHub Pages, we can't proxy, so load directly in iframe
    // This will fail for many sites due to X-Frame-Options/CSP
    const iframe = document.getElementById('container');
    
    // Inject theme via script (limited without proxy)
    if (theme !== 'default') {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `${basePath}/themes/${theme}.css`;
      document.head.appendChild(link);
    }
    
    iframe.src = targetUrl;
    
    // Show warning if iframe fails to load
    iframe.addEventListener('error', () => {
      document.getElementById('warning').style.display = 'block';
    });
    
    // Hide loader when iframe loads
    iframe.addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
      
      // Try to inject theme (will fail for cross-origin)
      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const link = iframeDoc.createElement('link');
        link.rel = 'stylesheet';
        link.href = window.location.origin + `/web-vessel/themes/${theme}.css`;
        iframeDoc.head.appendChild(link);
      } catch (e) {
        console.warn('Cannot inject theme due to CORS:', e);
        document.getElementById('warning').style.display = 'block';
      }
    });
    
    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(`${basePath}/sw.js`);
    }
  </script>
</body>
</html>
